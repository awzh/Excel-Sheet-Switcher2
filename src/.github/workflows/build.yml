name: Build XLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}
        
    - name: Create LIB from DEF
      shell: cmd
      run: |
        if "${{ matrix.arch }}" == "x86" (
          echo LIBRARY XLCALL32 > xlcall.def
          echo EXPORTS >> xlcall.def
          echo Excel12v >> xlcall.def
          lib /def:xlcall.def /machine:x86 /out:xlcall32.lib
          cl /LD /MD /Ox /D_XLL_ src\PreviousSheetToggle.c xlcall32.lib /link /DLL /OUT:PreviousSheetToggle32.xll
        ) else (
          echo LIBRARY XLCALL64 > xlcall.def
          echo EXPORTS >> xlcall.def
          echo Excel12v >> xlcall.def
          lib /def:xlcall.def /machine:x64 /out:xlcall64.lib
          cl /LD /MD /Ox /D_XLL_ src\PreviousSheetToggle.c xlcall64.lib /link /DLL /OUT:PreviousSheetToggle64.xll
        )
        
    - name: Upload XLL files
      uses: actions/upload-artifact@v4
      with:
        name: PreviousSheetToggle-${{ matrix.arch }}
        path: "*.xll"
        
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          PreviousSheetToggle-x64/*.xll
          PreviousSheetToggle-x86/*.xll
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
