name: Build XLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86]
    steps:
    - uses: actions/checkout@v4
    - uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}

    - name: Compile XLL
      shell: cmd
      run: |
        echo LIBRARY XLCALL > xlcall.def
        echo EXPORTS >> xlcall.def
        echo Excel12v >> xlcall.def
        if "${{ matrix.arch }}"=="x86" (
          lib /def:xlcall.def /machine:x86 /out:xlcall32.lib
          cl /LD /MD /Ox src\PreviousSheetToggle.c xlcall32.lib /link /DLL /EXPORT:xlAutoOpen /EXPORT:xlAutoClose /OUT:PreviousSheetToggle32.xll
        ) else (
          lib /def:xlcall.def /machine:x64 /out:xlcall64.lib
          cl /LD /MD /Ox src\PreviousSheetToggle.c xlcall64.lib /link /DLL /EXPORT:xlAutoOpen /EXPORT:xlAutoClose /OUT:PreviousSheetToggle64.xll
        )

    - uses: actions/upload-artifact@v4
      with:
        name: XLL-${{ matrix.arch }}
        path: "*.xll"
